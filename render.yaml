services:
  - type: web
    name: hostguide
    runtime: python
    buildCommand: apt-get update && apt-get install -y libpango-1.0-0 libpangocairo-1.0-0 libgdk-pixbuf2.0-0 libffi-dev libcairo2 && pip install -r requirements.txt && playwright install --with-deps chromium
    startCommand: cd /opt/render/project/src && gunicorn src.app:app --bind 0.0.0.0:$PORT --workers 2
    envVars:
      - key: PYTHON_VERSION
        value: 3.13.2
      - key: HOSTGUIDE_DOMAIN
        value: https://host-guide.net
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: HOSTGUIDE_ADMIN_SECRET
        sync: false
      - key: REDIS_URL
        fromService:
          type: redis
          name: tuto-redis
      - key: GOOGLE_MAPS_API_KEY
        sync: false
